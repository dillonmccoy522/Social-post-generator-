<div>
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:36px;">
    <div>
      <div class="page-title">Clients</div>
      <div class="page-subtitle">Manage your client accounts and brand voice settings.</div>
    </div>
    <button class="btn btn-primary" id="add-btn">+ Add Client</button>
  </div>

  <!-- ADD / EDIT FORM -->
  <div id="client-form" class="card" style="display:none;margin-bottom:24px;">
    <div class="section-label" id="form-label">New Client</div>
    <input type="hidden" id="edit-id" />

    <div class="form-row">
      <div>
        <label>Business Name</label>
        <input type="text" id="f-name" placeholder="Perfect Balance Roofing" />
      </div>
      <div>
        <label>Business Type</label>
        <input type="text" id="f-type" placeholder="Roofing" />
      </div>
    </div>

    <label>Location</label>
    <input type="text" id="f-location" placeholder="San Antonio, TX" />

    <label>Brand Voice Notes</label>
    <textarea id="f-voice" placeholder="e.g. Community-focused. Warm but confident. No corporate speak."></textarea>

    <div class="section-label" style="margin-top:8px;">Contact Info</div>
    <div class="form-row">
      <div>
        <label>Phone Number</label>
        <input type="text" id="f-phone" placeholder="(210) 555-0100" />
      </div>
      <div>
        <label>Website</label>
        <input type="text" id="f-website" placeholder="www.perfectbalanceroofing.com" />
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>Instagram URL</label>
        <input type="url" id="f-instagram" placeholder="https://www.instagram.com/perfectbalanceroofing" />
      </div>
      <div>
        <label>Facebook URL</label>
        <input type="url" id="f-facebook" placeholder="https://www.facebook.com/perfectbalanceroofing" />
      </div>
    </div>
    <label>Google My Business URL</label>
    <input type="url" id="f-gmb" placeholder="https://maps.app.goo.gl/..." />

    <div class="section-label" style="margin-top:8px;">Google Drive</div>
    <label>Photos Folder URL</label>
    <input type="url" id="f-photos-url" placeholder="https://drive.google.com/drive/folders/..." />
    <label>Output Folder URL</label>
    <input type="url" id="f-output-url" placeholder="https://drive.google.com/drive/folders/..." />

    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-primary" id="save-btn">Save Client</button>
      <button class="btn btn-ghost" id="cancel-btn">Cancel</button>
    </div>
  </div>

  <!-- CLIENT LIST -->
  <div id="client-list"><div class="empty-state">Loading clients...</div></div>
</div>

<script>
function esc(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

async function loadClients() {
  const res = await fetch('/api/clients');
  const clients = await res.json();
  const list = document.getElementById('client-list');
  if (clients.length === 0) {
    list.innerHTML = '<div class="empty-state">No clients yet. Add your first client above.</div>';
    return;
  }
  list.innerHTML = clients.map(c => `
    <div class="card" style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;">
      <div>
        <div style="font-weight:600;margin-bottom:4px;">${esc(c.name)}</div>
        <div style="color:var(--text-muted);font-size:12px;">${esc(c.business_type)} · ${esc(c.location)}</div>
        ${c.phone || c.website ? `<div style="color:var(--text-secondary);font-size:12px;margin-top:4px;">${[c.phone, c.website].filter(Boolean).map(v => esc(v)).join(' · ')}</div>` : ''}
        ${c.instagram || c.facebook ? `<div style="color:var(--text-muted);font-size:11px;margin-top:2px;">${[c.instagram, c.facebook].filter(Boolean).map(v => esc(v)).join(' · ')}</div>` : ''}
        ${c.brand_voice ? `<div style="color:var(--text-secondary);font-size:12.5px;margin-top:6px;">${esc(c.brand_voice)}</div>` : ''}
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button class="btn btn-secondary btn-sm" data-action="edit" data-id="${c.id}">Edit</button>
        <button class="btn btn-danger btn-sm" data-action="delete" data-id="${c.id}">Delete</button>
      </div>
    </div>
  `).join('');
}

function showForm(label = 'New Client') {
  document.getElementById('client-form').style.display = 'block';
  document.getElementById('form-label').textContent = label;
}

function hideForm() {
  document.getElementById('client-form').style.display = 'none';
  document.getElementById('edit-id').value = '';
  ['f-name','f-type','f-location','f-voice','f-phone','f-website','f-instagram','f-facebook','f-gmb','f-photos-url','f-output-url']
    .forEach(id => document.getElementById(id).value = '');
}

async function editClient(id) {
  const res = await fetch(`/api/clients/${id}`);
  if (!res.ok) { showToast('Failed to load client'); return; }
  const c = await res.json();
  document.getElementById('edit-id').value = c.id;
  document.getElementById('f-name').value = c.name || '';
  document.getElementById('f-type').value = c.business_type || '';
  document.getElementById('f-location').value = c.location || '';
  document.getElementById('f-voice').value = c.brand_voice || '';
  document.getElementById('f-phone').value = c.phone || '';
  document.getElementById('f-website').value = c.website || '';
  document.getElementById('f-instagram').value = c.instagram || '';
  document.getElementById('f-facebook').value = c.facebook || '';
  document.getElementById('f-gmb').value = c.gmb_url || '';
  document.getElementById('f-photos-url').value = c.drive_photos_url || '';
  document.getElementById('f-output-url').value = c.drive_output_url || '';
  showForm('Edit Client');
  document.getElementById('client-form').scrollIntoView({ behavior: 'smooth' });
}

async function saveClient() {
  const id = document.getElementById('edit-id').value;
  const body = {
    name: document.getElementById('f-name').value.trim(),
    business_type: document.getElementById('f-type').value.trim(),
    location: document.getElementById('f-location').value.trim(),
    brand_voice: document.getElementById('f-voice').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    website: document.getElementById('f-website').value.trim(),
    instagram: document.getElementById('f-instagram').value.trim(),
    facebook: document.getElementById('f-facebook').value.trim(),
    gmb_url: document.getElementById('f-gmb').value.trim(),
    drive_photos_url: document.getElementById('f-photos-url').value.trim(),
    drive_output_url: document.getElementById('f-output-url').value.trim(),
  };
  if (!body.name || !body.business_type || !body.location) {
    showToast('Name, business type, and location are required');
    return;
  }
  const method = id ? 'PUT' : 'POST';
  const url = id ? `/api/clients/${id}` : '/api/clients';
  const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    showToast(err.error || 'Failed to save client');
    return;
  }
  hideForm();
  loadClients();
  showToast(id ? 'Client updated' : 'Client added');
}

async function deleteClient(id) {
  if (!confirm('Delete this client? All post history for this client will also be removed.')) return;
  const res = await fetch(`/api/clients/${id}`, { method: 'DELETE' });
  if (!res.ok) { showToast('Failed to delete client'); return; }
  loadClients();
  showToast('Client deleted');
}

loadClients();

document.getElementById('add-btn').addEventListener('click', showForm);
document.getElementById('save-btn').addEventListener('click', saveClient);
document.getElementById('cancel-btn').addEventListener('click', hideForm);

document.getElementById('client-list').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const id = parseInt(btn.dataset.id, 10);
  if (btn.dataset.action === 'edit') editClient(id);
  else if (btn.dataset.action === 'delete') deleteClient(id);
});
</script>
